            // Store NORMALIZED coords (0-1) not screen coords
            // This ensures even distribution when scaling to any canvas size
            if (clean) pixels.push({ nx: x / SW, ny: y / SH });
        }
    }

    // Apply pose bounding box filter using normalized coords
    let filteredPixels = pixels;
    if (smoothedLandmarks && smoothedLandmarks.length >= 15) {
        const lm = smoothedLandmarks;
        let minX = 1, maxX = 0, minY = 1, maxY = 0;
        lm.forEach(l => {
            if (!l || l.visibility < 0.05) return;
            if (l.x < minX) minX = l.x;
            if (l.x > maxX) maxX = l.x;
            if (l.y < minY) minY = l.y;
            if (l.y > maxY) maxY = l.y;
        });
        const padX = (maxX - minX) * 0.40;
        const padY = (maxY - minY) * 0.40;
        const normBx1 = Math.max(0, minX - padX);
        const normBx2 = Math.min(1, maxX + padX);
        const normBy1 = Math.max(0, minY - padY);
        const normBy2 = Math.min(1, maxY + padY * 1.6);
        // Mirror: mask nx=0 is right side, nx=1 is left side
        const mNx1 = 1 - normBx2;
        const mNx2 = 1 - normBx1;
        filteredPixels = pixels.filter(p =>
            p.nx >= mNx1 && p.nx <= mNx2 &&
            p.ny >= normBy1 && p.ny <= normBy2
        );
    }

    // Convert to screen coords AFTER filtering
    stardustMaskPixels = filteredPixels.map(p => ({
        x: p.nx * cw,
        y: p.ny * ch
    }));
}

        function renderStardustMan() {
            if (!smoothedLandmarks || smoothedLandmarks.length < 29) return;
            stardustFrameCount++;
            const lm = smoothedLandmarks;
            const cw = canvas.width, ch = canvas.height;

            // Refresh mask pixel list every frame when segmentation is available
            if (segmentationMask) {
                updateStardustMaskPixels(segmentationMask);
            }

            // --- STEP 1: Detect fast joints and spawn explosion particles ---
            const trackedJoints = [0,11,12,13,14,15,16,23,24,25,26,27,28];
            trackedJoints.forEach(ji => {
                const lmj = lm[ji];
                if (!lmj) return;
                const cx = lmj.x * cw, cy = lmj.y * ch;
                const mx = cw - cx; // mirror x to match display
                const prev = stardustPrevJoints[ji];
                if (prev) {
                    const vx = mx - prev.x;
                    const vy = cy - prev.y;
                    const speed = Math.sqrt(vx*vx + vy*vy);
                    if (speed > STARDUST_CONFIG.explosionThreshold) {
                        const count = Math.min(
                            STARDUST_CONFIG.explosionParticlesPerFrame,
                            STARDUST_CONFIG.explosionMaxParticles - stardustExplosionParticles.length
                        );
                        for (let i = 0; i < count; i++) {
                            const spread = (Math.random() - 0.5) * Math.PI * 0.9;
                            const angle = Math.atan2(vy, vx) + spread + Math.PI;
                            const spd = (0.5 + Math.random()) * STARDUST_CONFIG.explosionSpeed * (speed / 25);
                            const col = getStardustColor();
                            stardustExplosionParticles.push({
                                x: mx + (Math.random()-0.5)*14,
                                y: cy + (Math.random()-0.5)*14,
                                vx: Math.cos(angle) * spd,
                                vy: Math.sin(angle) * spd,
                                life: STARDUST_CONFIG.explosionLife,
                                maxLife: STARDUST_CONFIG.explosionLife,
                                size: STARDUST_CONFIG.explosionSize * (0.4 + Math.random() * 0.8),
                                r: col.r, g: col.g, b: col.b
                            });
                        }
                    }
                }
                stardustPrevJoints[ji] = { x: mx, y: cy };
            });

            // --- STEP 2: Update explosion particles physics ---
            for (let i = stardustExplosionParticles.length - 1; i >= 0; i--) {
                const p = stardustExplosionParticles[i];
                p.x += p.vx; p.y += p.vy;
                p.vx *= 0.94; p.vy *= 0.94;
                p.vy += 0.05; // gravity
                p.life--;
                if (p.life <= 0) stardustExplosionParticles.splice(i, 1);
            }

            // --- STEP 3: Draw explosion particles behind body ---
            stardustExplosionParticles.forEach(p => {
                const alpha = p.life / p.maxLife;
                const size = p.size * (0.3 + alpha * 0.7);
                ctx.globalAlpha = alpha * 0.85;
                ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                ctx.fill();
                if (alpha > 0.4) {
                    ctx.globalAlpha = alpha * 0.2;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size * 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // --- STEP 4: Draw body fill particles from segmentation mask pixels ---
            if (stardustMaskPixels.length > 0) {
                const total = stardustMaskPixels.length;
                for (let i = 0; i < STARDUST_CONFIG.particleCount; i++) {
                    // Pick random position from confirmed body pixels
                    const pt = stardustMaskPixels[Math.floor(Math.random() * total)];
                    // Small jitter so particles don't sit exactly on pixel grid
                    const jx = pt.x + (Math.random() - 0.5) * 3;
                    const jy = pt.y + (Math.random() - 0.5) * 3;
                    const col = getStardustColor();
                    const flicker = 0.4 + Math.random() * 0.6;
                    const size = STARDUST_CONFIG.particleSize * (0.3 + Math.random() * 0.9);
                    // Bright core
                    ctx.globalAlpha = flicker * 0.95;
                    ctx.fillStyle = `rgb(${col.r},${col.g},${col.b})`;
                    ctx.beginPath();
                    ctx.arc(jx, jy, size, 0, Math.PI * 2);
                    ctx.fill();
                    // Soft star halo on brighter particles
                    if (flicker > 0.7) {
                        ctx.globalAlpha = flicker * 0.15;
                        ctx.beginPath();
                        ctx.arc(jx, jy, size * 3.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            // --- STEP 5: Joint hotspot glow ---
            trackedJoints.forEach(ji => {
                const lmj = lm[ji];
                if (!lmj) return;
                const x = cw - lmj.x * cw; // mirrored
                const y = lmj.y * ch;
                for (let i = 0; i < 14; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * 14;
                    const col = getStardustColor();
                    ctx.globalAlpha = 0.5 + Math.random() * 0.5;
                    ctx.fillStyle = `rgb(${col.r},${col.g},${col.b})`;
                    ctx.beginPath();
                    ctx.arc(x + Math.cos(angle)*r, y + Math.sin(angle)*r,
                            1.0 + Math.random()*1.8, 0, Math.PI*2);
                    ctx.fill();
                }
            });

            ctx.globalAlpha = 1.0;
        }
        
        // FILTER 6: WARLI ART - TRIBAL GEOMETRIC HUMAN FIGURE
        function renderWarliArt() {
            if (smoothedLandmarks.length === 0) return;
            const lm = smoothedLandmarks;
            const cw = canvas.width, ch = canvas.height;

            // --- BACKGROUND: earthy brown like Warli paintings ---
            ctx.fillStyle = '#7B2D00';
            ctx.fillRect(0, 0, cw, ch);

            // Add subtle texture feel with a slightly lighter center
            const grad = ctx.createRadialGradient(cw/2, ch/2, 0, cw/2, ch/2, cw * 0.7);
            grad.addColorStop(0, 'rgba(120, 60, 10, 0.3)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, cw, ch);

            // --- BORDER: traditional Warli decorative border ---
            const bw = Math.min(cw, ch) * 0.04; // border width
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 2;

            // Outer rectangle border
            ctx.strokeRect(bw * 0.5, bw * 0.5, cw - bw, ch - bw);
            ctx.strokeRect(bw, bw, cw - bw * 2, ch - bw * 2);

            // Draw triangular zigzag pattern along all 4 edges
            const triSize = bw * 0.7;
            ctx.fillStyle = '#FFFFFF';

            // Top edge triangles
            for (let x = bw; x < cw - bw; x += triSize * 2) {
                ctx.beginPath();
                ctx.moveTo(x, bw);
                ctx.lineTo(x + triSize, bw * 0.2);
                ctx.lineTo(x + triSize * 2, bw);
                ctx.closePath();
                ctx.fill();
            }
            // Bottom edge triangles (pointing up)
            for (let x = bw; x < cw - bw; x += triSize * 2) {
                ctx.beginPath();
                ctx.moveTo(x, ch - bw);
                ctx.lineTo(x + triSize, ch - bw * 0.2);
                ctx.lineTo(x + triSize * 2, ch - bw);
                ctx.closePath();
                ctx.fill();
            }
            // Left edge triangles
            for (let y = bw; y < ch - bw; y += triSize * 2) {
                ctx.beginPath();
                ctx.moveTo(bw, y);
                ctx.lineTo(bw * 0.2, y + triSize);
                ctx.lineTo(bw, y + triSize * 2);
                ctx.closePath();
                ctx.fill();
            }
            // Right edge triangles
            for (let y = bw; y < ch - bw; y += triSize * 2) {
                ctx.beginPath();
                ctx.moveTo(cw - bw, y);
                ctx.lineTo(cw - bw * 0.2, y + triSize);
                ctx.lineTo(cw - bw, y + triSize * 2);
                ctx.closePath();
                ctx.fill();
            }

            // Dot row inside border
            ctx.fillStyle = '#FFFFFF';
            const dotSpacing = triSize * 2;
            const dotR = bw * 0.15;
            const dotY1 = bw * 1.5, dotY2 = ch - bw * 1.5;
            const dotX1 = bw * 1.5, dotX2 = cw - bw * 1.5;
            for (let x = bw * 2; x < cw - bw * 2; x += dotSpacing) {
                ctx.beginPath(); ctx.arc(x, dotY1, dotR, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(x, dotY2, dotR, 0, Math.PI * 2); ctx.fill();
            }
            for (let y = bw * 2; y < ch - bw * 2; y += dotSpacing) {
                ctx.beginPath(); ctx.arc(dotX1, y, dotR, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(dotX2, y, dotR, 0, Math.PI * 2); ctx.fill();
            }

            // --- WARLI FIGURE: drawn using pose landmarks ---
            ctx.strokeStyle = '#FFFFFF';
            ctx.fillStyle = '#FFFFFF';
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // Helper: landmark to canvas coords (mirrored)
            const lx = (i) => (1 - lm[i].x) * cw;
            const ly = (i) => lm[i].y * ch;

            // Key points
            const headX = lx(0), headY = ly(0);
            const lShoulderX = lx(11), lShoulderY = ly(11);
            const rShoulderX = lx(12), rShoulderY = ly(12);
            const lHipX = lx(23), lHipY = ly(23);
            const rHipX = lx(24), rHipY = ly(24);
            const lElbowX = lx(13), lElbowY = ly(13);
            const rElbowX = lx(14), rElbowY = ly(14);
            const lWristX = lx(15), lWristY = ly(15);
            const rWristX = lx(16), rWristY = ly(16);
            const lKneeX = lx(25), lKneeY = ly(25);
            const rKneeX = lx(26), rKneeY = ly(26);
            const lAnkleX = lx(27), lAnkleY = ly(27);
            const rAnkleX = lx(28), rAnkleY = ly(28);

            // Compute body proportions
            const shoulderMidX = (lShoulderX + rShoulderX) / 2;
            const shoulderMidY = (lShoulderY + rShoulderY) / 2;
            const hipMidX = (lHipX + rHipX) / 2;
            const hipMidY = (lHipY + rHipY) / 2;
            const shoulderWidth = Math.abs(lShoulderX - rShoulderX);
            const torsoHeight = Math.abs(hipMidY - shoulderMidY);

            // Head — circle
            const headRadius = shoulderWidth * 0.28;
            ctx.beginPath();
            ctx.arc(headX, headY, headRadius, 0, Math.PI * 2);
            ctx.fill();

            // Neck — line from head to shoulder midpoint
            const lineW = Math.max(2, shoulderWidth * 0.06);
            ctx.lineWidth = lineW;
            ctx.beginPath();
            ctx.moveTo(headX, headY + headRadius);
            ctx.lineTo(shoulderMidX, shoulderMidY);
            ctx.stroke();

            // Upper torso — inverted triangle (shoulders → waist center)
            // In Warli art the torso is two triangles: upper body (inverted) + skirt (upright)
            const waistX = (shoulderMidX + hipMidX) / 2;
            const waistY = (shoulderMidY + hipMidY) / 2;
            ctx.beginPath();
            ctx.moveTo(lShoulderX, shoulderMidY);
            ctx.lineTo(rShoulderX, shoulderMidY);
            ctx.lineTo(waistX, waistY);
            ctx.closePath();
            ctx.fill();

            // Lower skirt — upright triangle (waist → hips)
            const skirtBottom = hipMidY + torsoHeight * 0.5;
            const skirtWidth = shoulderWidth * 0.9;
            ctx.beginPath();
            ctx.moveTo(waistX, waistY);
            ctx.lineTo(waistX - skirtWidth / 2, skirtBottom);
            ctx.lineTo(waistX + skirtWidth / 2, skirtBottom);
            ctx.closePath();
            ctx.fill();

            // Decorative dots on torso (Warli style necklace/pattern)
            const dotSize = headRadius * 0.2;
            ctx.fillStyle = '#7B2D00';
            for (let d = 0; d < 5; d++) {
                const t = d / 4;
                const dx = lShoulderX + (rShoulderX - lShoulderX) * (0.2 + t * 0.6);
                const dy = shoulderMidY + torsoHeight * 0.12;
                ctx.beginPath();
                ctx.arc(dx, dy, dotSize, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = '#FFFFFF';

            // Left arm — line from left shoulder to elbow to wrist
            ctx.lineWidth = lineW;
            ctx.beginPath();
            ctx.moveTo(lShoulderX, shoulderMidY);
            ctx.lineTo(lElbowX, lElbowY);
            ctx.lineTo(lWristX, lWristY);
            ctx.stroke();

            // Right arm
            ctx.beginPath();
            ctx.moveTo(rShoulderX, shoulderMidY);
            ctx.lineTo(rElbowX, rElbowY);
            ctx.lineTo(rWristX, rWristY);
            ctx.stroke();

            // Small circles at wrists (hands)
            const handR = headRadius * 0.22;
            ctx.beginPath(); ctx.arc(lWristX, lWristY, handR, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(rWristX, rWristY, handR, 0, Math.PI * 2); ctx.fill();

            // Left leg — from hip to knee to ankle
            ctx.lineWidth = lineW;
            ctx.beginPath();
            ctx.moveTo(waistX - skirtWidth * 0.25, skirtBottom);
            ctx.lineTo(lKneeX, lKneeY);
            ctx.lineTo(lAnkleX, lAnkleY);
            ctx.stroke();

            // Right leg
            ctx.beginPath();
            ctx.moveTo(waistX + skirtWidth * 0.25, skirtBottom);
            ctx.lineTo(rKneeX, rKneeY);
            ctx.lineTo(rAnkleX, rAnkleY);
            ctx.stroke();

            // Small circles at ankles (feet)
            const footR = headRadius * 0.18;
            ctx.beginPath(); ctx.arc(lAnkleX, lAnkleY, footR, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(rAnkleX, rAnkleY, footR, 0, Math.PI * 2); ctx.fill();

            // Reset
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorOverlay').style.display = 'flex';

        function retryCamera() {
            document.getElementById('errorOverlay').style.display = 'none';
            toggleCamera();}
        
        // ============================================================
        // FILTER 7: DIGITAL VOXEL CLOUD
        //
        // HOW IT WORKS:
        //   LAYER 1 — Body grid: every frame, the silhouette is divided
        //             into a VC_GRID×VC_GRID pixel grid. Each occupied
        //             cell draws one cube. This IS the person.
        //   LAYER 2 — Trail cubes: when a grid cell moves more than
        //             VC_SHED_THRESH px since last frame, it has a chance
        //             to shed a "left behind" cube at its old position.
        //             Trail cubes drift upward, shrink, and fade smoothly
        //             to nothing using an ease-out alpha curve (t²).
        // ============================================================

        function resetVoxelCloud() {
            vcGridPrev     = {};
            vcTrailVoxels  = [];
            vcPrevCentroid = null;
            vcMaskCanvas   = null;
            vcMaskCtx      = null;
            voxelParticles = [];
        }

        // Lazy-init a private canvas for reading the segmentation mask
        function getVcMaskCtx() {
            if (!vcMaskCanvas) {
                vcMaskCanvas = document.createElement('canvas');
                vcMaskCanvas.width  = PROCESSING_WIDTH;
                vcMaskCanvas.height = PROCESSING_HEIGHT;
                vcMaskCtx = vcMaskCanvas.getContext('2d', { willReadFrequently: true });
            }
            return vcMaskCtx;
        }

        // With selfieMode:false, person = LOW red value (near 0),
// background = HIGH red value (near 255).
// Do NOT mirror the mask here — mirror X in the coordinate mapping instead,
// consistent with how applySegmentationMask() works for all other filters.
        function getVcRawMask() {
            const mctx = getVcMaskCtx();
            mctx.clearRect(0, 0, PROCESSING_WIDTH, PROCESSING_HEIGHT);
            mctx.drawImage(segmentationMask, 0, 0, PROCESSING_WIDTH, PROCESSING_HEIGHT);
            return mctx.getImageData(0, 0, PROCESSING_WIDTH, PROCESSING_HEIGHT).data;
        }

        // Draw a single cube with 3-face isometric shading at canvas pos (cx, cy)
        function drawVoxelCube(cx, cy, size, r, g, b, alpha) {
            if (alpha <= 0.01) return;
            const s    = size - VC_GAP;
            const half = s * 0.5;

            ctx.globalAlpha = alpha;
            ctx.shadowBlur  = 7;
            ctx.shadowColor = `rgba(${r},${g},${b},0.75)`;
            ctx.fillStyle   = `rgb(${r},${g},${b})`;
            ctx.fillRect(cx - half, cy - half, s, s);       // front face

            ctx.shadowBlur = 0;
            ctx.fillStyle  = `rgba(255,255,255,${alpha * 0.30})`;
            ctx.fillRect(cx - half, cy - half, s, s * 0.28); // top highlight

            ctx.fillStyle  = `rgba(0,0,0,${alpha * 0.42})`;
            ctx.fillRect(cx + half - s * 0.28, cy - half, s * 0.28, s); // right shadow

            ctx.fillStyle  = `rgba(255,255,255,${alpha * 0.45})`;
            const cs = s * 0.26;
            ctx.fillRect(cx - cs * 0.5, cy - cs * 0.5, cs, cs); // inner core

            // Always reset state after drawing — prevents shadow/alpha leaking
            // into the next frame's background clear
            ctx.shadowBlur  = 0;
            ctx.globalAlpha = 1;
            ctx.shadowColor = 'transparent';
        }

        function renderDigitalVoxelCloud() {
            const cw = canvas.width;
            const ch = canvas.height;

            // ── HARD RESET — wipe ALL canvas state from previous frame ──
            // Without this, shadowBlur from the last cube drawn persists
            // and prevents the background fillRect from fully clearing old cubes.
            ctx.shadowBlur  = 0;
            ctx.shadowColor = 'transparent';
            ctx.globalAlpha = 1;
            ctx.globalCompositeOperation = 'source-over';

            // ── BACKGROUND ───────────────────────────────────────────
            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0, 0, cw, ch);

            // Faint depth-camera grid lines
            ctx.strokeStyle = 'rgba(0,255,255,0.03)';
            ctx.lineWidth   = 1;
            for (let gx = 0; gx < cw; gx += VC_GRID * 2) {
                ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, ch); ctx.stroke();
            }
            for (let gy = 0; gy < ch; gy += VC_GRID * 2) {
                ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(cw, gy); ctx.stroke();
            }

            // ── HAND HEIGHT → COLOR RATIO ─────────────────────────────
            // 0.0 = hands down  → Cyan   #00FFFF
            // 1.0 = hands up    → Purple #BF00FF
            let handRatio = 0;
            if (smoothedLandmarks.length > 0) {
                const lWristY    = smoothedLandmarks[15]?.y ?? 0.8;
                const rWristY    = smoothedLandmarks[16]?.y ?? 0.8;
                const lShoulderY = smoothedLandmarks[11]?.y ?? 0.4;
                const rShoulderY = smoothedLandmarks[12]?.y ?? 0.4;
                const avgHandY     = (lWristY  + rWristY)    / 2;
                const avgShoulderY = (lShoulderY + rShoulderY) / 2;
                handRatio = Math.max(0, Math.min(1,
                    (avgShoulderY - avgHandY) / Math.max(avgShoulderY, 0.01)
                ));
            }

            // Base colour: lerp Cyan → Electric Purple
            const baseR = Math.round(lerp(0,   191, handRatio));
            const baseG = Math.round(lerp(255,   0, handRatio));
            const baseB = 255;

            // ── LAYER 1: BODY GRID ────────────────────────────────────
            // Walk the canvas in VC_GRID steps. For each cell, sample the
            // segmentation mask. If it's a person pixel → draw a cube.
            // Track how far each cell moved to shed trail cubes.

            const vcGridCurr = {};

            if (segmentationMask) {
                const rawMask = getVcRawMask();

                // Track silhouette centroid for motion detection
                let sumX = 0, sumY = 0, cellCount = 0;

                for (let cy2 = VC_GRID * 0.5; cy2 < ch; cy2 += VC_GRID) {
                    for (let cx2 = VC_GRID * 0.5; cx2 < cw; cx2 += VC_GRID) {

                        // Map canvas cell → mask pixel.
// Mirror X because display is selfie-flipped but mask is not.
                        const maskX = Math.round((1 - cx2 / cw) * (PROCESSING_WIDTH  - 1));
                        const maskY = Math.round((    cy2 / ch) * (PROCESSING_HEIGHT - 1));

                        // Vote across 3×3 neighbourhood.
                        // Threshold 200 matches applySegmentationMask() which is proven correct.
                        // Background pixels are near 0, person pixels are near 255.
                        // Requiring 7/9 votes prevents background noise from leaking in.
                        let votes = 0;
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                const sx  = Math.max(0, Math.min(PROCESSING_WIDTH  - 1, maskX + dx));
                                const sy  = Math.max(0, Math.min(PROCESSING_HEIGHT - 1, maskY + dy));
                                const idx = (sy * PROCESSING_WIDTH + sx) * 4;
                                if (rawMask[idx] > 200) votes++; // person = bright/high value, matches applySegmentationMask()
                            }
                        }
                        if (votes < 7) continue; // ✅ strong majority required

                        const col = Math.floor(cx2 / VC_GRID);
                        const row = Math.floor(cy2 / VC_GRID);
                        const key = `${col},${row}`;
                        vcGridCurr[key] = { x: cx2, y: cy2 };

                        sumX += cx2;
                        sumY += cy2;
                        cellCount++;

                        // Draw the live body cube
                        const yRatio = cy2 / ch;
                        const cr = Math.round(lerp(baseR, Math.min(255, baseR + 45), yRatio));
                        const cg = Math.round(lerp(baseG, Math.max(0,   baseG - 25), yRatio));
                        drawVoxelCube(cx2, cy2, VC_GRID, cr, cg, baseB, 0.93);
                    }
                }

                // ── Trail shedding based on CENTROID movement ─────────────
                // Fixed grid cells never change their x,y coordinates so
                // per-cell motion was always zero. Instead we track how much
                // the whole silhouette centroid moved — if the person moved,
                // shed trails scattered across the previous silhouette cells.
                if (cellCount > 0) {
                    const centX = sumX / cellCount;
                    const centY = sumY / cellCount;

                    if (vcPrevCentroid) {
                        const moveDx   = centX - vcPrevCentroid.x;
                        const moveDy   = centY - vcPrevCentroid.y;
                        const moveDist = Math.sqrt(moveDx * moveDx + moveDy * moveDy);

                        // Shed trail cubes proportional to how fast the person moved
                        if (moveDist > VC_SHED_THRESH) {
                            const shedCount = Math.floor(moveDist * 3);
                            const prevKeys  = Object.keys(vcGridPrev);
                            for (let s = 0; s < shedCount && prevKeys.length > 0; s++) {
                                if (Math.random() > VC_SHED_CHANCE) continue;
                                const randKey = prevKeys[Math.floor(Math.random() * prevKeys.length)];
                                const pc      = vcGridPrev[randKey];
                                const angle   = Math.atan2(-moveDy, -moveDx) + (Math.random() - 0.5) * 2.0;
                                const spd     = 0.4 + Math.random() * 1.8;
                                vcTrailVoxels.push({
                                    x:     pc.x,
                                    y:     pc.y,
                                    vx:    Math.cos(angle) * spd,
                                    vy:    Math.sin(angle) * spd - 0.5,
                                    size:  VC_GRID * (0.6 + Math.random() * 0.6),
                                    life:  1.0,
                                    decay: 0.007 + Math.random() * 0.010,
                                    r: baseR, g: baseG, b: baseB
                                });
                            }
                        }
                    }
                    vcPrevCentroid = { x: centX, y: centY };
                }

            } else if (smoothedLandmarks.length > 0) {
                // Fallback when mask not yet available — fill pose bounding box
                const xs   = smoothedLandmarks.map(l => (1 - l.x) * cw);
                const ys   = smoothedLandmarks.map(l =>       l.y  * ch);
                const minX = Math.min(...xs), maxX = Math.max(...xs);
                const minY = Math.min(...ys), maxY = Math.max(...ys);
                for (let cy2 = minY; cy2 < maxY; cy2 += VC_GRID) {
                    for (let cx2 = minX; cx2 < maxX; cx2 += VC_GRID) {
                        const col = Math.floor(cx2 / VC_GRID);
                        const row = Math.floor(cy2 / VC_GRID);
                        vcGridCurr[`${col},${row}`] = { x: cx2, y: cy2 };
                        drawVoxelCube(cx2, cy2, VC_GRID, baseR, baseG, baseB, 0.85);
                    }
                }
            }

            // Snapshot this frame → used next frame to detect movement
            vcGridPrev = vcGridCurr;

            // ── LAYER 2: TRAIL CUBES (left behind, drift + fade) ─────
            if (vcTrailVoxels.length > VC_TRAIL_MAX) {
                vcTrailVoxels.splice(0, vcTrailVoxels.length - VC_TRAIL_MAX);
            }

            const surviving = [];
            for (let i = 0; i < vcTrailVoxels.length; i++) {
                const v = vcTrailVoxels[i];

                // Physics
                v.x  += v.vx;
                v.y  += v.vy;
                v.vy -= 0.018;                           // gentle upward buoyancy
                v.vx += (Math.random() - 0.5) * 0.05;   // subtle lateral flutter
                v.vx *= 0.97;
                v.vy *= 0.99;
                v.life -= v.decay;

                if (v.life <= 0) continue; // fully faded — discard

                // ── GRADUAL FADE: ease-out squared curve ──────────────
                // t² means the cube stays bright longer, then smoothly
                // accelerates toward invisible — no hard cutoff.
                const t     = Math.max(0, Math.min(1, v.life));
                const alpha = t * t * 0.80;

                // Cube also SHRINKS as it ages → visually "dissolves"
                const shrunkSize = v.size * (0.35 + t * 0.65);

                drawVoxelCube(v.x, v.y, shrunkSize, v.r, v.g, v.b, alpha);
                surviving.push(v);
            }
            vcTrailVoxels = surviving;

            ctx.globalAlpha = 1;
            ctx.shadowBlur  = 0;

            // ── HUD: Cyan ↔ Purple indicator bar ─────────────────────
            const barW = 180, barH = 8;
            const barX = cw / 2 - barW / 2;
            const barY = ch - 28;
            const grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
            grad.addColorStop(0, '#00FFFF');
            grad.addColorStop(1, '#BF00FF');
            ctx.globalAlpha = 0.7;
            ctx.fillStyle   = grad;
            ctx.fillRect(barX, barY, barW, barH);
            ctx.globalAlpha = 1;
            ctx.fillStyle   = '#fff';
            ctx.shadowBlur  = 5;
            ctx.shadowColor = '#fff';
            ctx.beginPath();
            ctx.arc(barX + handRatio * barW, barY + barH / 2, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur  = 0;
            ctx.globalAlpha = 1;
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorOverlay').style.display = 'flex';
        }
        
        function retryCamera() {
            document.getElementById('errorOverlay').style.display = 'none';
            toggleCamera();
        }

        // Initialize when page loads
        // ============================================================
        // FILTER 8: VAN GOGH FLOW FIELD
        // ============================================================

        function resetVanGoghFlow() {
            vgField       = null;
            vgBaseField   = null;
            vgParticles   = [];
            vgOffscreen   = null;
            vgOffCtx      = null;
            vgInitialized = false;
            vgPrevJoints  = {};
        }

        // Build the base Van Gogh swirl field.
        // Five overlapping circular swirls create the layered Starry Night turbulence.
        function vgBuildBaseField(cw, ch) {
            const field = new Float32Array(VG_COLS * VG_ROWS);
            const cellW = cw / VG_COLS;
            const cellH = ch / VG_ROWS;

            const swirls = [
                { cx: 0.72, cy: 0.22, r: 0.38, dir: 1, str: 1.4 }, // main top-right galaxy swirl
                { cx: 0.28, cy: 0.30, r: 0.28, dir: -1, str: 1.1 }, // secondary upper-left swirl
                { cx: 0.50, cy: 0.65, r: 0.45, dir: 1, str: 0.9 }, // large lower swirl
                { cx: 0.85, cy: 0.70, r: 0.22, dir: -1, str: 0.8 }, // small right swirl
                { cx: 0.12, cy: 0.75, r: 0.20, dir: 1, str: 0.7 }, // small left swirl
            ];

            for (let row = 0; row < VG_ROWS; row++) {
                for (let col = 0; col < VG_COLS; col++) {
                    const px = (col + 0.5) * cellW;
                    const py = (row + 0.5) * cellH;
                    let ax = 0, ay = 0;

                    for (const s of swirls) {
                        const scx = s.cx * cw;
                        const scy = s.cy * ch;
                        const sr  = s.r  * Math.min(cw, ch);
                        const dx  = px - scx;
                        const dy  = py - scy;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const influence = s.str * Math.exp(-dist * dist / (2 * sr * sr));
                        // Tangent to circle = perpendicular to radial direction
                        const tx = -dy * s.dir;
                        const ty =  dx * s.dir;
                        const tLen = Math.sqrt(tx * tx + ty * ty) || 1;
                        ax += (tx / tLen) * influence;
                        ay += (ty / tLen) * influence;
                    }

                    ax += 0.25; // gentle horizontal drift
                    field[row * VG_COLS + col] = Math.atan2(ay, ax);
                }
            }
            return field;
        }

        function vgInit(cw, ch) {
            vgOffscreen = document.createElement('canvas');
            vgOffscreen.width  = cw;
            vgOffscreen.height = ch;
            vgOffCtx = vgOffscreen.getContext('2d');

            // Start with deep night-sky blue
            vgOffCtx.fillStyle = '#0a0f2e';
            vgOffCtx.fillRect(0, 0, cw, ch);

            vgBaseField = vgBuildBaseField(cw, ch);
            vgField     = new Float32Array(vgBaseField);

            vgParticles = [];
            for (let i = 0; i < VG_PARTICLES; i++) {
                vgParticles.push(vgSpawnParticle(cw, ch));
            }

            vgInitialized = true;
        }

        function vgSpawnParticle(cw, ch) {
            const col = VG_ALL[Math.floor(Math.random() * VG_ALL.length)];
            const maxLife = Math.floor(Math.random() * 60) + 20;
            return {
                x:       Math.random() * cw,
                y:       Math.random() * ch,
                color:   col,
                life:    maxLife,
                maxLife: maxLife,
                speed:   VG_SPEED * (0.6 + Math.random() * 0.8),
                width:   1.2 + Math.random() * 2.2,
                age:     0,
            };
        }

        function vgFieldAngle(x, y, cw, ch) {
            const col = Math.max(0, Math.min(VG_COLS - 1, (x / cw) * VG_COLS)) | 0;
            const row = Math.max(0, Math.min(VG_ROWS - 1, (y / ch) * VG_ROWS)) | 0;
            return vgField[row * VG_COLS + col];
        }

        // Apply disturbance from pose joints to field.
        // Each moving joint temporarily overwrites nearby field angles
        // with its movement direction, bending strokes around the body.
        function vgApplyDisturbance(cw, ch) {
            if (!smoothedLandmarks || smoothedLandmarks.length === 0) return;

            const jointIds = [0, 11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];

            for (const ji of jointIds) {
                const lm = smoothedLandmarks[ji];
                if (!lm || (lm.visibility !== undefined && lm.visibility < 0.3)) continue;

                const jx = (1 - lm.x) * cw; // mirror X for selfie
                const jy = lm.y * ch;

                let velX = 0, velY = 0;
                if (vgPrevJoints[ji]) {
                    velX = jx - vgPrevJoints[ji].x;
                    velY = jy - vgPrevJoints[ji].y;
                }
                vgPrevJoints[ji] = { x: jx, y: jy };

                const speed = Math.sqrt(velX * velX + velY * velY);
                if (speed < 0.5) continue; // ignore micro-jitter

                const moveAngle  = Math.atan2(velY, velX);
                const distCellR  = (VG_DISTORT_R / Math.min(cw, ch)) * Math.min(VG_COLS, VG_ROWS);
                const jCol       = (jx / cw) * VG_COLS;
                const jRow       = (jy / ch) * VG_ROWS;

                for (let row = 0; row < VG_ROWS; row++) {
                    for (let col = 0; col < VG_COLS; col++) {
                        const dc   = col - jCol;
                        const dr   = row - jRow;
                        const dist = Math.sqrt(dc * dc + dr * dr);
                        if (dist > distCellR) continue;

                        const t = Math.pow(1 - dist / distCellR, 2)
                                  * Math.min(1, speed / 8)
                                  * VG_DISTORT_STR;

                        const baseAngle = vgBaseField[row * VG_COLS + col];
                        // Angle interpolation via unit vector lerp (avoids wrap-around issues)
                        const bx = Math.cos(baseAngle);
                        const by = Math.sin(baseAngle);
                        const mx = Math.cos(moveAngle);
                        const my = Math.sin(moveAngle);
                        const rx = bx + (mx - bx) * Math.min(1, t);
                        const ry = by + (my - by) * Math.min(1, t);
                        vgField[row * VG_COLS + col] = Math.atan2(ry, rx);
                    }
                }
            }
        }

        // Gradually restore field to base — disturbances dissolve over time
        function vgDecayField() {
            const decay = 0.08;
            for (let i = 0; i < vgField.length; i++) {
                const base = vgBaseField[i];
                const curr = vgField[i];
                const bx = Math.cos(base);
                const by = Math.sin(base);
                const cx2 = Math.cos(curr);
                const cy2 = Math.sin(curr);
                const rx = cx2 + (bx - cx2) * decay;
                const ry = cy2 + (by - cy2) * decay;
                vgField[i] = Math.atan2(ry, rx);
            }
        }

        function renderVanGoghFlow() {
            const cw = canvas.width;
            const ch = canvas.height;

            // Initialise on first call or if canvas was resized
            if (!vgInitialized || vgOffscreen.width !== cw || vgOffscreen.height !== ch) {
                vgInit(cw, ch);
            }

            // ── STEP 1: Apply pose disturbance ────────────────────────
            vgApplyDisturbance(cw, ch);

            // ── STEP 2: Decay field back toward base ──────────────────
            vgDecayField();

            // ── STEP 3: Fade offscreen canvas — creates paint layering ─
            vgOffCtx.globalAlpha = 0.035;
            vgOffCtx.fillStyle   = '#0a0f2e';
            vgOffCtx.fillRect(0, 0, cw, ch);
            vgOffCtx.globalAlpha = 1;

            // ── STEP 3b: ERASE person area from offscreen each frame ──
            // This is the key fix for the frozen silhouette bug.
            // Even though the silhouette is drawn live on the main canvas,
            // strokes accumulate INSIDE the body on vgOffscreen over time.
            // When the person moves, the old body area has dense bright strokes
            // painted into it — which looks like a stuck silhouette outline.
            // Fix: use destination-out to punch a transparent hole in vgOffscreen
            // exactly where the person currently is, every frame.
            // Then the dark background shows through naturally at that location,
            // and strokes can never build up inside the body.
            if (segmentationMask) {
                // Build person mask at canvas resolution
                const eraseCanvas = document.createElement('canvas');
                eraseCanvas.width  = cw;
                eraseCanvas.height = ch;
                const eraseCtx = eraseCanvas.getContext('2d', { willReadFrequently: true });

                // Read segmentation mask
                const mTemp = document.createElement('canvas');
                mTemp.width  = PROCESSING_WIDTH;
                mTemp.height = PROCESSING_HEIGHT;
                const mCtx = mTemp.getContext('2d', { willReadFrequently: true });
                mCtx.drawImage(segmentationMask, 0, 0, PROCESSING_WIDTH, PROCESSING_HEIGHT);
                const mData = mCtx.getImageData(0, 0, PROCESSING_WIDTH, PROCESSING_HEIGHT).data;

                // Fill person pixels as opaque white (any opaque colour works for destination-out)
                eraseCtx.fillStyle = 'rgba(255,255,255,1)';
                for (let py = 0; py < PROCESSING_HEIGHT; py += 3) {
                    for (let px = 0; px < PROCESSING_WIDTH; px += 3) {
                        const idx = (py * PROCESSING_WIDTH + px) * 4;
                        if (mData[idx] > 200) {
                            const sx = cw - (px / PROCESSING_WIDTH) * cw; // mirror X for selfie
                            const sy = (py / PROCESSING_HEIGHT) * ch;
                            eraseCtx.fillRect(sx - 6, sy - 6, 12, 12);
                        }
                    }
                }

                // Punch that shape out of vgOffscreen — removes ALL accumulated
                // strokes inside the body, replacing them with transparency
                vgOffCtx.globalCompositeOperation = 'destination-out';
                vgOffCtx.globalAlpha = 0.85; // strong erase but not 100% — keeps subtle edge glow
                vgOffCtx.drawImage(eraseCanvas, 0, 0);
                vgOffCtx.globalCompositeOperation = 'source-over'; // CRITICAL: restore normal drawing
                vgOffCtx.globalAlpha = 1;
            }

            // ── STEP 5: Update and draw stroke particles ──────────────
            vgOffCtx.lineCap  = 'round';
            vgOffCtx.lineJoin = 'round';

            const toRespawn = [];

            for (let i = 0; i < vgParticles.length; i++) {
                const p = vgParticles[i];
                p.age++;

                const angle = vgFieldAngle(p.x, p.y, cw, ch);
                const stepX = Math.cos(angle) * p.speed;
                const stepY = Math.sin(angle) * p.speed;
                const nx    = p.x + stepX;
                const ny    = p.y + stepY;

                // Life-based alpha: fade in → full → fade out
                const lifeFrac = p.age / p.maxLife;
                const alpha = lifeFrac < 0.15
                    ? lifeFrac / 0.15
                    : lifeFrac > 0.80
                        ? (1 - lifeFrac) / 0.20
                        : 1.0;

                vgOffCtx.globalAlpha = alpha * 0.75;
                vgOffCtx.strokeStyle = p.color;
                vgOffCtx.lineWidth   = p.width;
                vgOffCtx.beginPath();
                vgOffCtx.moveTo(p.x, p.y);
                vgOffCtx.lineTo(nx, ny);
                vgOffCtx.stroke();

                p.x = nx;
                p.y = ny;
                p.life--;

                if (p.life <= 0 || nx < 0 || nx > cw || ny < 0 || ny > ch) {
                    toRespawn.push(i);
                }
            }

            vgOffCtx.globalAlpha = 1;

            for (const idx of toRespawn) {
                vgParticles[idx] = vgSpawnParticle(cw, ch);
            }

            // ── STEP 6: Blit offscreen then composite LIVE silhouette ─
            ctx.globalAlpha = 1;
            ctx.shadowBlur  = 0;
            ctx.drawImage(vgOffscreen, 0, 0); // swirling paint layer

            // Composite live silhouette on top of strokes.
            // The transparent hole in vgOffscreen shows black (#000) underneath.
            // We need the body to be VISIBLY distinct — so we draw:
            //   a) A dark navy fill for body interior
            //   b) A soft glowing edge outline so silhouette reads as human
            if (segmentationMask) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width  = PROCESSING_WIDTH;
                tempCanvas.height = PROCESSING_HEIGHT;
                const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
                tempCtx.drawImage(segmentationMask, 0, 0, PROCESSING_WIDTH, PROCESSING_HEIGHT);
                const maskData = tempCtx.getImageData(0, 0, PROCESSING_WIDTH, PROCESSING_HEIGHT).data;

                // Build silhouette on a canvas the size of the display
                const silCanvas = document.createElement('canvas');
                silCanvas.width  = cw;
                silCanvas.height = ch;
                const silCtx = silCanvas.getContext('2d');

                // Pass 1: dark body fill — clean silhouette for immersive Van Gogh experience
                silCtx.fillStyle = '#060d1f';
                for (let py = 0; py < PROCESSING_HEIGHT; py += 3) {
                    for (let px = 0; px < PROCESSING_WIDTH; px += 3) {
                        const idx = (py * PROCESSING_WIDTH + px) * 4;
                        if (maskData[idx] > 200) {
                            const sx = cw - (px / PROCESSING_WIDTH) * cw;
                            const sy = (py / PROCESSING_HEIGHT) * ch;
                            silCtx.fillRect(sx - 6, sy - 6, 12, 12);
                        }
                    }
                }

                // Draw the clean silhouette onto the main canvas
                ctx.globalAlpha = 1;
                ctx.drawImage(silCanvas, 0, 0);
                ctx.globalAlpha = 1;
            }

            ctx.shadowColor = 'transparent';
            ctx.shadowBlur  = 0;
        }

        // ═══════════════════════════════════════════════════════════
        // FILTER 9: VORTEX GRAVITY WELL
        // Particles are attracted by inverse-square gravity to the
        // user's wrists/hands. Tangential force creates orbital swirl.
        // Color shifts deep-blue → gold → white as speed increases.
        // ═══════════════════════════════════════════════════════════

        let vgwParticles    = [];
        let vgwOffscreen    = null;
        let vgwOffCtx       = null;
        let vgwInitialized  = false;

        const VGW_COUNT     = 3500;
        const VGW_G         = 4200;
        const VGW_TANGENT   = 0.45;
        const VGW_MAX_SPEED = 22;

        function vgwColorFromSpeed(speed) {
            const t = Math.min(speed / VGW_MAX_SPEED, 1.0);
            if (t < 0.35) {
                const s = t / 0.35;
                return `rgb(${Math.round(160 + s*95)},${Math.round(120 + s*80)},10)`;
            } else if (t < 0.75) {
                const s = (t - 0.35) / 0.40;
                return `rgb(255,${Math.round(200 + s*50)},20)`;
            } else {
                const s = (t - 0.75) / 0.25;
                return `rgb(255,255,${Math.round(s*220)})`;
            }
        }

        function vgwSpawnParticle(cw, ch) {
            const edge = Math.floor(Math.random() * 4);
            let x, y;
            if      (edge === 0) { x = Math.random() * cw; y = -5; }
            else if (edge === 1) { x = Math.random() * cw; y = ch + 5; }
            else if (edge === 2) { x = -5;                 y = Math.random() * ch; }
            else                 { x = cw + 5;             y = Math.random() * ch; }
            const towardX = (cw * 0.5 - x) / Math.max(cw, ch);
            const towardY = (ch * 0.5 - y) / Math.max(cw, ch);
            return {
                x, y,
                vx: towardX * 0.8 + (Math.random() - 0.5) * 0.4,
                vy: towardY * 0.8 + (Math.random() - 0.5) * 0.4,
                size: 1.2 + Math.random() * 2.2,
            };
        }

        function vgwInit(cw, ch) {
            vgwOffscreen        = document.createElement('canvas');
            vgwOffscreen.width  = cw;
            vgwOffscreen.height = ch;
            vgwOffCtx           = vgwOffscreen.getContext('2d');
            vgwOffCtx.fillStyle = '#000';
            vgwOffCtx.fillRect(0, 0, cw, ch);
            vgwParticles = Array.from({ length: VGW_COUNT }, () => {
                const p = vgwSpawnParticle(cw, ch);
                p.x = Math.random() * cw;
                p.y = Math.random() * ch;
                return p;
            });
            vgwInitialized = true;
        }

        function renderVortexGravityWell() {
            const cw = canvas.width;
            const ch = canvas.height;

            if (!vgwInitialized || vgwOffscreen.width !== cw || vgwOffscreen.height !== ch) {
                vgwInit(cw, ch);
            }

            // Collect wrist positions as gravity sources (landmarks 15=left wrist, 16=right wrist)
            const sources = [];
            if (smoothedLandmarks.length > 0) {
                [15, 16].forEach(idx => {
                    const lm = smoothedLandmarks[idx];
                    if (lm && lm.visibility > 0.3) {
                        sources.push({ x: (1 - lm.x) * cw, y: lm.y * ch });
                    }
                });
            }

            // Fade trail
            vgwOffCtx.globalAlpha = 0.35;
            vgwOffCtx.fillStyle   = '#000';
            vgwOffCtx.fillRect(0, 0, cw, ch);
            vgwOffCtx.globalAlpha = 1;

            // Erase person silhouette area
            if (segmentationMask) {
                const eraseCanvas  = document.createElement('canvas');
                eraseCanvas.width  = cw; eraseCanvas.height = ch;
                const eraseCtx     = eraseCanvas.getContext('2d', { willReadFrequently: true });
                const mTemp        = document.createElement('canvas');
                mTemp.width        = PROCESSING_WIDTH; mTemp.height = PROCESSING_HEIGHT;
                const mCtx         = mTemp.getContext('2d', { willReadFrequently: true });
                mCtx.drawImage(segmentationMask, 0, 0, PROCESSING_WIDTH, PROCESSING_HEIGHT);
                const mData        = mCtx.getImageData(0, 0, PROCESSING_WIDTH, PROCESSING_HEIGHT).data;
                eraseCtx.fillStyle = 'rgba(255,255,255,1)';
                for (let py = 0; py < PROCESSING_HEIGHT; py += 3) {
                    for (let px = 0; px < PROCESSING_WIDTH; px += 3) {
                        const i = (py * PROCESSING_WIDTH + px) * 4;
                        if (mData[i] > 200) {
                            const sx = cw - (px / PROCESSING_WIDTH) * cw;
                            const sy = (py / PROCESSING_HEIGHT) * ch;
                            eraseCtx.fillRect(sx - 7, sy - 7, 14, 14);
                        }
                    }
                }
                vgwOffCtx.globalCompositeOperation = 'destination-out';
                vgwOffCtx.globalAlpha = 0.9;
                vgwOffCtx.drawImage(eraseCanvas, 0, 0);
                vgwOffCtx.globalCompositeOperation = 'source-over';
                vgwOffCtx.globalAlpha = 1;
            }

            // Update physics and draw particles
            vgwOffCtx.lineCap = 'round';
            for (let i = 0; i < vgwParticles.length; i++) {
                const p = vgwParticles[i];
                let respawned = false;

                if (sources.length > 0) {
                    let ax = 0, ay = 0;
                    for (const src of sources) {
                        const dx   = src.x - p.x;
                        const dy   = src.y - p.y;
                        const dist = Math.sqrt(dx*dx + dy*dy) + 1;
                        if (dist < 22) {
                            vgwParticles[i] = vgwSpawnParticle(cw, ch);
                            respawned = true; break;
                        }
                        const force = VGW_G / (dist * dist);
                        const nx    = dx / dist;
                        const ny    = dy / dist;
                        ax += nx * force - ny * force * VGW_TANGENT;
                        ay += ny * force + nx * force * VGW_TANGENT;
                    }
                    if (!respawned) { p.vx += ax; p.vy += ay; }
                } else {
                    p.vx += (Math.random() - 0.5) * 0.06;
                    p.vy += (Math.random() - 0.5) * 0.06;
                    p.vx *= 0.97; p.vy *= 0.97;
                }

                if (respawned) continue;

                const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
                if (speed > VGW_MAX_SPEED) { p.vx = p.vx/speed*VGW_MAX_SPEED; p.vy = p.vy/speed*VGW_MAX_SPEED; }

                const nx   = p.x + p.vx;
                const ny   = p.y + p.vy;
                const safe = Math.max(speed, 0.01);
                const blen = Math.min(speed * 2.5, 45);
                const tx   = p.x - (p.vx/safe)*blen;
                const ty   = p.y - (p.vy/safe)*blen;

                vgwOffCtx.strokeStyle = vgwColorFromSpeed(speed);
                vgwOffCtx.lineWidth   = p.size * (0.5 + speed/VGW_MAX_SPEED * 1.5);
                vgwOffCtx.globalAlpha = 0.4 + (speed/VGW_MAX_SPEED)*0.6;
                vgwOffCtx.beginPath();
                vgwOffCtx.moveTo(tx, ty);
                vgwOffCtx.lineTo(nx, ny);
                vgwOffCtx.stroke();
                vgwOffCtx.globalAlpha = 1;

                p.x = nx; p.y = ny;
                if (nx < -30 || nx > cw+30 || ny < -30 || ny > ch+30) {
                    vgwParticles[i] = vgwSpawnParticle(cw, ch);
                }
            }

            // Blit particle layer FIRST
            ctx.globalAlpha = 1;
            ctx.drawImage(vgwOffscreen, 0, 0);

            // Draw glowing orbs at hand positions ON TOP of particles
            for (const src of sources) {
                const grad = ctx.createRadialGradient(src.x, src.y, 0, src.x, src.y, 100);
                grad.addColorStop(0,    'rgba(255,255,220,1)');
                grad.addColorStop(0.12, 'rgba(255,230,50, 0.9)');
                grad.addColorStop(0.35, 'rgba(255,160,0,  0.5)');
                grad.addColorStop(0.7,  'rgba(200,80,0,   0.15)');
                grad.addColorStop(1,    'rgba(0,0,0,0)');
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(src.x, src.y, 100, 0, Math.PI*2);
                ctx.fill();
                const core = ctx.createRadialGradient(src.x, src.y, 0, src.x, src.y, 20);
                core.addColorStop(0,   'rgba(255,255,255,1)');
                core.addColorStop(0.5, 'rgba(255,240,80, 0.9)');
                core.addColorStop(1,   'rgba(255,180,0,  0)');
                ctx.fillStyle = core;
                ctx.beginPath();
                ctx.arc(src.x, src.y, 20, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }

            // Draw dark silhouette on top of everything
            if (segmentationMask) {
                const tempCanvas  = document.createElement('canvas');
                tempCanvas.width  = PROCESSING_WIDTH; tempCanvas.height = PROCESSING_HEIGHT;
                const tempCtx     = tempCanvas.getContext('2d', { willReadFrequently: true });
                tempCtx.drawImage(segmentationMask, 0, 0, PROCESSING_WIDTH, PROCESSING_HEIGHT);
                const maskData    = tempCtx.getImageData(0, 0, PROCESSING_WIDTH, PROCESSING_HEIGHT).data;
                const silCanvas   = document.createElement('canvas');
                silCanvas.width   = cw; silCanvas.height = ch;
                const silCtx      = silCanvas.getContext('2d');
                silCtx.fillStyle  = '#050a18';
                for (let py = 0; py < PROCESSING_HEIGHT; py += 3) {
                    for (let px = 0; px < PROCESSING_WIDTH; px += 3) {
                        const i = (py * PROCESSING_WIDTH + px) * 4;
                        if (maskData[i] > 200) {
                            const sx = cw - (px / PROCESSING_WIDTH) * cw;
                            const sy = (py / PROCESSING_HEIGHT) * ch;
                            silCtx.fillRect(sx-6, sy-6, 12, 12);
                        }
                    }
                }
                ctx.globalAlpha = 1;
                ctx.drawImage(silCanvas, 0, 0);
            }

            ctx.shadowColor = 'transparent';
            ctx.shadowBlur  = 0;
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
